<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퍼즐 플레이</title>
<script src="https://cdn.jsdelivr.net/npm/jigsaw-puzzle/dist/jigsaw-puzzle.min.js"></script>

<style>
body{
    margin:0;
    background:white;
    text-align:center;
    font-family:sans-serif;
}

h1{
    margin-top:50px;
}

p{
    color:#666;
}

.box{
    margin-top:50px;
    font-size:24px;
}

a{
    display:inline-block;
    margin-top:40px;
    padding:15px 30px;
    background:black;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

#puzzleImage{
    width: 90%;
    max-width: 900px;
    margin-top: 30px;
}

#hintBtn{
    display:block;
    margin:20px auto;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#4a6cf7;
    color:white;
    cursor:pointer;
}

#puzzleCanvas{
    width:580px;
    height:326px;
    margin:20px auto;
    display:block;
}

#board{
    width:580px;
    height:326px;
    margin:20px auto;
    border:5px dashed red;
}

#pieces{
    width:700px;
    margin:30px auto;

    display:flex;
    flex-wrap:wrap;
    gap:4px;

    justify-content:center;
}

.piece{
    border:1px solid #333;
    box-sizing:border-box;
}

</style>

</head>
<body>

<h1>☁️ 마음에 날씨가 있다면</h1>

<button id="hintBtn">💡 힌트 보기</button>

<div id="board"></div>

<div id="pieces"></div>

<a href="puzzle.html">
← 돌아가기
</a>

<script src="play.js"></script>

</body>
</html>
